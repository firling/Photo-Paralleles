name: build-and-push

# Build the Docker image and push it to the Registring registry. The push fires
# Registring's webhook; the project's tag rule (main → prod) triggers a
# blue/green rollout. Registring builds nothing itself — this workflow is the
# only build step. See the Registring deployment doc, §7.3 / §10.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual re-builds from the Actions tab

# Avoid overlapping pushes racing each other onto the same tag.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.registring.anquetil.org
  IMAGE: photos-paralleles # must match the project's "Dépôt d'image" in Registring

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Registring registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # The server runs amd64; pin it so an arm runner can't push an
          # incompatible image.
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:main
          # Speed up subsequent builds with the GitHub Actions layer cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
